<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Time Breathing Clock v1.0 — NextWave Labs</title>
<style>
  :root{
    --bg0:#03070d;
    --bg1:#07111f;
    --bg2:#0c1b33;
    --face0:#070d16;
    --face1:#101826;
    --ring0:#111722;
    --ring1:#5d6775;
    --tick:#eaf1fb;
    --muted:#8a95a6;
    --hand:#f2f5f8;
    --second:#49a7ff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#03070d;font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;color:#fff}
  body{
    display:grid;place-items:center;
    background:
      radial-gradient(circle at 50% 43%, rgba(73,167,255,.13), transparent 25%),
      radial-gradient(circle at 50% 50%, var(--bg2) 0%, var(--bg1) 42%, var(--bg0) 100%);
  }
  .stage{position:relative;width:min(94vw,94vh);height:min(94vw,94vh);display:grid;place-items:center}
  canvas{width:100%;height:100%;display:block;filter:drop-shadow(0 30px 70px rgba(0,0,0,.55))}

  .time-insight{
    position:fixed;
    left:50%;
    bottom:7.2vh;
    transform:translateX(-50%) translateY(8px);
    width:min(86vw,900px);
    text-align:center;
    pointer-events:none;
    opacity:0;
    transition:opacity 2.4s ease, transform 2.4s ease;
    color:rgba(234,241,251,.88);
    font-size:clamp(18px,2.2vw,32px);
    font-weight:300;
    letter-spacing:.02em;
    line-height:1.35;
    text-shadow:0 10px 30px rgba(0,0,0,.65);
  }
  .time-insight.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
  .time-insight span{
    display:block;
    color:rgba(138,149,166,.78);
    font-size:.72em;
    margin-top:.45em;
  }


  .quote-control{
    display:none; /* Hidden for production; preserved for future testing */
    position:fixed;
    right:3.2vw;
    bottom:3.2vh;
    z-index:5;
    width:min(260px,34vw);
    padding:14px 16px;
    border:1px solid rgba(234,241,251,.12);
    border-radius:18px;
    background:rgba(3,7,13,.36);
    backdrop-filter:blur(14px);
    box-shadow:0 18px 50px rgba(0,0,0,.28);
    color:rgba(234,241,251,.78);
    font-size:13px;
    letter-spacing:.02em;
    user-select:none;
  }
  .quote-control label{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    margin-bottom:10px;
  }
  .quote-control strong{
    color:rgba(234,241,251,.9);
    font-weight:400;
  }
  .quote-control input{
    width:100%;
    accent-color:var(--second);
  }

</style>
</head>
<body>
  <main class="stage">
    <canvas id="clock"></canvas>

    <div id="timeInsight" class="time-insight">
      Time never became faster.
      <span>Your remaining opportunities became fewer.</span>
    </div>
  </main>

  <div class="quote-control">
    <label>
      <span>Quote after</span>
      <strong><span id="quoteTimeValue">2</span> min</strong>
    </label>
    <input id="quoteTimeSlider" type="range" min="2" max="5" step="1" value="2" />
  </div>


<script>
(() => {


// Quote list and timing control: show one random quote after the selected interval.
const insight = document.getElementById('timeInsight');
const quoteTimeSlider = document.getElementById('quoteTimeSlider');
const quoteTimeValue = document.getElementById('quoteTimeValue');

const timeQuotes = [
  {
    "line1": "Time never became faster.",
    "line2": "Your remaining opportunities became fewer."
  },
  {
    "line1": "Time is constant.",
    "line2": "Opportunity isn't."
  },
  {
    "line1": "Life doesn't accelerate.",
    "line2": "Awareness does."
  },
  {
    "line1": "The clock measures time.",
    "line2": "Life measures moments."
  },
  {
    "line1": "We don't lose time.",
    "line2": "We lose moments."
  },
  {
    "line1": "Every minute begins quietly…",
    "line2": "…and leaves quickly."
  },
  {
    "line1": "Every hour is a new beginning.",
    "line2": ""
  },
  {
    "line1": "Opportunity has its own clock.",
    "line2": ""
  },
  {
    "line1": "Spend time before it spends you.",
    "line2": ""
  },
  {
    "line1": "Time never changed.",
    "line2": "You did."
  },
  {
    "line1": "The last moments always feel the shortest.",
    "line2": ""
  },
  {
    "line1": "Observe carefully.",
    "line2": "Time is teaching."
  },
  {
    "line1": "The clock is honest.",
    "line2": "Our attention isn't."
  },
  {
    "line1": "Observe carefully.",
    "line2": "Think clearly. Act courageously. Remain kind."
  },
  {
    "line1": "Time gives everyone 24 hours.",
    "line2": "It doesn't give everyone the same attention."
  },
  {
    "line1": "Your future is built",
    "line2": "one unnoticed minute at a time."
  },
  {
    "line1": "Ideas wait.",
    "line2": "Opportunities don't."
  }
];

let quoteCycleTarget = Number(quoteTimeSlider?.value || 2);
let completedBreathingCycles = 0;
let lastCycleMinute = new Date().getMinutes();
let quoteVisible = false;
let lastQuoteIndex = -1;

function chooseRandomQuote() {
  if (!insight || !timeQuotes.length) return;

  let index = Math.floor(Math.random() * timeQuotes.length);
  if (timeQuotes.length > 1 && index === lastQuoteIndex) {
    index = (index + 1) % timeQuotes.length;
  }
  lastQuoteIndex = index;

  const q = timeQuotes[index];
  insight.innerHTML = q.line2
    ? `${q.line1}<span>${q.line2}</span>`
    : `${q.line1}`;
}

if (quoteTimeSlider && quoteTimeValue) {
  quoteCycleTarget = Number(quoteTimeSlider.value);
  quoteTimeValue.textContent = quoteCycleTarget;

  quoteTimeSlider.addEventListener('input', () => {
    quoteCycleTarget = Number(quoteTimeSlider.value);
    quoteTimeValue.textContent = quoteCycleTarget;
    completedBreathingCycles = 0;
    lastCycleMinute = new Date().getMinutes();
    quoteVisible = false;
    insight?.classList.remove('show');
  });
}

function showRandomQuote() {
  if (quoteVisible) return;

  quoteVisible = true;
  chooseRandomQuote();
  insight?.classList.add('show');

  setTimeout(() => {
    insight?.classList.remove('show');
  }, 6000);

  setTimeout(() => {
    quoteVisible = false;
  }, 9000);
}

function updateInsightCycle(){
  const d = new Date();
  const minute = d.getMinutes();
  const second = d.getSeconds() + d.getMilliseconds() / 1000;

  // Count a breathing cycle only once at a real minute boundary.
  if (minute !== lastCycleMinute && second < 0.25) {
    lastCycleMinute = minute;
    completedBreathingCycles++;
  }

  if (completedBreathingCycles >= quoteCycleTarget) {
    completedBreathingCycles = 0;
    showRandomQuote();
  }
}

  window.addEventListener('resize', resize, {passive:true});
  resize();

  function smoothstep(x){ x = Math.max(0, Math.min(1, x)); return x*x*(3 - 2*x); }
  function smootherstep(x){ x = Math.max(0, Math.min(1, x)); return x*x*x*(x*(x*6 - 15) + 10); }

  function currentPeak(nowMs){
    // Hidden adaptation: 2.0x at start, slowly reaching 3.2x after 20 minutes.
    const minutes = Math.max(0, (nowMs - boot) / 60000);
    return 2.0 + 1.2 * Math.min(1, minutes / 20);
  }

  function rawBreathingSpeed(t, peak){
    // t = seconds within minute [0,60). Shape only; it is normalized later
    // so one breath always lands exactly at 12 when the minute completes.
    if (t < 15) return 1;
    if (t < 50) return 1 + (peak - 1) * smootherstep((t - 15) / 35);
    if (t < 55) return peak;
    return 1 + (peak - 1) * (1 - smootherstep((t - 55) / 5));
  }

  function breathingProgress(t, peak){
    // Numerical integration of speed(t), normalized by total area.
    // This preserves the exact inhale/exhale speed feeling while guaranteeing
    // progress(60) = 1.000000, i.e. second hand arrives exactly at 12.
    const steps = 720;
    const dt = 60 / steps;
    let total = 0;
    let partial = 0;
    for(let i=0;i<steps;i++){
      const a = i * dt;
      const b = a + dt;
      const mid = (a + b) / 2;
      const area = rawBreathingSpeed(mid, peak) * dt;
      total += area;
      if (b <= t) partial += area;
      else if (a < t) partial += rawBreathingSpeed((a + t) / 2, peak) * (t - a);
    }
    return partial / total;
  }

  function line(angle, r0, r1, width, color, cap='round'){
    const x0 = Math.cos(angle) * r0, y0 = Math.sin(angle) * r0;
    const x1 = Math.cos(angle) * r1, y1 = Math.sin(angle) * r1;
    ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1);
    ctx.lineWidth = width; ctx.strokeStyle = color; ctx.lineCap = cap; ctx.stroke();
  }

  function hand(angle, length, back, width, color, shadow=0){
    ctx.save();
    if(shadow){ ctx.shadowBlur = shadow; ctx.shadowColor = color; }
    line(angle, -back, length, width, color, 'round');
    ctx.restore();
  }

  function draw(){
    const box = canvas.getBoundingClientRect();
    const w = box.width, h = box.height;
    const cx = w/2, cy = h/2;
    const r = Math.min(w,h) * 0.405;
    const nowMs = performance.now();
    const date = new Date();

    ctx.clearRect(0,0,w,h);
    ctx.save(); ctx.translate(cx,cy);

    // Outer aura
    let g = ctx.createRadialGradient(0,0,r*.2,0,0,r*1.42);
    g.addColorStop(0,'rgba(73,167,255,.05)');
    g.addColorStop(.68,'rgba(73,167,255,.12)');
    g.addColorStop(1,'rgba(73,167,255,0)');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0,0,r*1.42,0,Math.PI*2); ctx.fill();

    // Bezel
    g = ctx.createRadialGradient(-r*.25,-r*.35,r*.55,0,0,r*1.08);
    g.addColorStop(0,'#66717f'); g.addColorStop(.42,'#202735'); g.addColorStop(.72,'#0c111b'); g.addColorStop(1,'#384250');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0,0,r*1.075,0,Math.PI*2); ctx.fill();

    // Face
    g = ctx.createRadialGradient(-r*.22,-r*.28,r*.1,0,0,r);
    g.addColorStop(0,'#121d2d'); g.addColorStop(.62,'#08111d'); g.addColorStop(1,'#050a12');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();

    // Inner glass vignette
    ctx.strokeStyle='rgba(235,242,250,.16)'; ctx.lineWidth=r*.006; ctx.beginPath(); ctx.arc(0,0,r*.965,0,Math.PI*2); ctx.stroke();

    // Minimal marks
    for(let i=0;i<60;i++){
      const a = -Math.PI/2 + i * Math.PI*2/60;
      const major = i%15===0;
      const five = i%5===0;
      const len = major ? r*.105 : five ? r*.072 : r*.035;
      const width = major ? r*.012 : five ? r*.007 : r*.0032;
      const alpha = major ? .82 : five ? .56 : .25;
      line(a, r-len, r-r*.025, width, `rgba(234,241,251,${alpha})`, 'round');
    }

    // Dial branding: top center, secondary to the clock hands.
    ctx.save();
    ctx.globalAlpha = .50;
    const brandY = -r*.52;
    const logoW = r*.32;
    const logoH = logo.complete && logo.naturalWidth
      ? logoW * (logo.naturalHeight / logo.naturalWidth)
      : logoW * .56;
    if (logo.complete && logo.naturalWidth) {
      ctx.drawImage(logo, -logoW/2, brandY - logoH*.72, logoW, logoH);
    } else {
      ctx.font = `800 ${r*.13}px Inter, sans-serif`;
      ctx.textAlign='center';
      ctx.fillStyle='rgba(235,242,250,.55)';
      ctx.fillText('N',0,brandY - r*.035);
    }
    ctx.restore();

    ctx.save();
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(235,242,250,.72)';
    ctx.font = `500 ${r*.030}px Inter, sans-serif`; ctx.letterSpacing = `${r*.016}px`;
    ctx.fillText('NEXTWAVE LABS',0,brandY + r*.078);
    ctx.fillStyle='rgba(235,242,250,.60)';
    ctx.font = `500 ${r*.022}px Inter, sans-serif`; ctx.letterSpacing = `${r*.012}px`;
    ctx.fillText('SINCE 2025',0,r*.64);
    ctx.restore();

    // Real continuous hour/minute hands
    const ms = date.getMilliseconds();
    const sReal = date.getSeconds() + ms/1000;
    const mReal = date.getMinutes() + sReal/60;
    const hReal = (date.getHours()%12) + mReal/60;
    const hourA = -Math.PI/2 + hReal * Math.PI*2/12;
    const minA  = -Math.PI/2 + mReal * Math.PI*2/60;

    hand(hourA, r*.48, r*.055, r*.035, 'rgba(242,245,248,.94)');
    hand(hourA, r*.38, r*.035, r*.019, 'rgba(255,255,255,.46)');
    hand(minA, r*.74, r*.075, r*.019, 'rgba(242,245,248,.96)');
    hand(minA, r*.66, r*.055, r*.008, 'rgba(255,255,255,.62)');

    // Breathing second hand: independent within current minute, exact reset at 12.
    const t = date.getSeconds() + ms/1000;
    const peak = currentPeak(nowMs);
    const progress = breathingProgress(t, peak);
    const secA = -Math.PI/2 + progress * Math.PI*2;
    hand(secA, r*.80, r*.12, r*.0065, 'rgba(73,167,255,.95)', r*.035);
    hand(secA, r*.80, r*.12, r*.0025, 'rgba(198,231,255,.95)', r*.02);

    // Center cap
    g = ctx.createRadialGradient(-r*.02,-r*.03,r*.01,0,0,r*.055);
    g.addColorStop(0,'#f7fbff'); g.addColorStop(.35,'#98a7b8'); g.addColorStop(.7,'#28313f'); g.addColorStop(1,'#0b111b');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0,0,r*.052,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(235,242,250,.45)'; ctx.lineWidth=r*.004; ctx.stroke();
    ctx.fillStyle='rgba(73,167,255,.70)'; ctx.beginPath(); ctx.arc(0,0,r*.018,0,Math.PI*2); ctx.fill();

    ctx.restore();
    updateInsightCycle();
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>

<script>
(() => {
  const insight = document.getElementById('timeInsight');
  if (!insight) return;

  const showForMs = 5000;
  const firstDelayMs = 90000;
  const repeatEveryMs = 180000;

  function showInsight(){
    insight.classList.add('show');
    setTimeout(() => insight.classList.remove('show'), showForMs);
  }

  setTimeout(() => {
    showInsight();
    setInterval(showInsight, repeatEveryMs);
  }, firstDelayMs);
})();
</script>
